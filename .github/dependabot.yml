version: 2

updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/skill-audit"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "harrypham2000"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    reviewers:
      - "harrypham2000"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"