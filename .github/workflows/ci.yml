name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: skill-audit/package-lock.json

      - name: Install dependencies
        working-directory: ./skill-audit
        run: npm ci

      - name: Run tests
        working-directory: ./skill-audit
        run: npm test

      - name: Build
        working-directory: ./skill-audit
        run: npm run build

      - name: Test CLI
        working-directory: ./skill-audit
        run: node dist/index.js --help

      - name: Run lint mode (smoke test)
        working-directory: ./skill-audit
        run: node dist/index.js --mode lint --global --json > /dev/null
