name: Beta Release

on:
  push:
    branches:
      - develop

permissions:
  contents: write
  id-token: write

env:
  ACTIONS_STEP_DEBUG: false
  ACTIONS_RUNNER_DEBUG: false
  NPM_CONFIG_LOGLEVEL: warn

jobs:
  beta-release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'skip release')"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: ./skill-audit
        run: npm ci

      - name: Run tests
        working-directory: ./skill-audit
        run: npm test

      - name: Build
        working-directory: ./skill-audit
        run: npm run build

      - name: Determine beta version
        id: version
        working-directory: ./skill-audit
        run: |
          # Get current version
          CURRENT=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT"

          # Check if already a beta version
          if [[ "$CURRENT" == *"-beta"* ]]; then
            # Increment beta number
            BETA_NUM=$(echo "$CURRENT" | sed 's/.*-beta\.//')
            NEW_BETA=$((BETA_NUM + 1))
            BASE_VERSION=$(echo "$CURRENT" | sed 's/-beta\..*//')
            NEW_VERSION="${BASE_VERSION}-beta.${NEW_BETA}"
          else
            # Create new beta version (bump minor)
            npm version --no-git-tag-version minor --silent > /dev/null
            BASE_VERSION=$(node -p "require('./package.json').version")
            NEW_VERSION="${BASE_VERSION}-beta.1"
          fi

          echo "New beta version: $NEW_VERSION"

          # Update package.json
          npm version --no-git-tag-version --allow-same-version "$NEW_VERSION" --silent

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Configure npm
        run: |
          npm config set //registry.npmjs.org/:_authToken $NPM_TOKEN
          npm config set otp false
          npm whoami
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm (beta tag)
        working-directory: ./skill-audit
        run: npm publish --tag beta --access public --provenance

      - name: Create GitHub Pre-release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.version }}
          name: Beta Release v${{ steps.version.outputs.version }}
          body: |
            ## Beta Release
            
            This is a pre-release for testing purposes. Not recommended for production use.
            
            ### Install
            ```bash
            npm install @hungpg/skill-audit@beta
            ```
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version bump
        working-directory: ./skill-audit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump to v${{ steps.version.outputs.version }} [skip release]"
          git push origin develop