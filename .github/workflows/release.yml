name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      has_changes: ${{ steps.version.outputs.has_changes }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: ./skill-audit
        run: npm ci

      - name: Run tests
        working-directory: ./skill-audit
        run: npm test

      - name: Build
        working-directory: ./skill-audit
        run: npm run build

      - name: Determine release version
        id: version
        working-directory: ./skill-audit
        run: |
          git fetch origin main --tags

          CURRENT=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT"

          TAG_EXISTS=$(git ls-remote --tags origin refs/tags/v$CURRENT 2>/dev/null || echo "")
          if [ -n "$TAG_EXISTS" ]; then
            echo "Tag v$CURRENT already exists, skipping release"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "version=$CURRENT" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Releasing package.json version: $CURRENT"
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "version=$CURRENT" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.version.outputs.has_changes == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## Context-aware agent environment auditing

            This release adds a context-aware safety layer for skill-audit so agents can reason about their execution environment across sessions instead of depending only on skill invocation hooks.

            ### Highlights

            - Added `skill-audit doctor` for read-only scans of agent hooks/config, shell startup files, PATH resolution, workspace instruction files, MCP/tool-style command configs, and package lifecycle scripts.
            - Added `skill-audit trust env` and `skill-audit diff-env` to store compact environment baselines and detect drift across agent sessions without loading full logs or conversation history into the context window.
            - Added `--check-command` for hook-friendly classification of sensitive shell commands such as skill installs, package installs, remote script execution, agent config edits, shell startup edits, and executable permission changes.
            - Added `CTX-*` findings for executable skills that do not declare what session facts they read, what preconditions they require, what they write back, and what confirmation boundary applies.
            - Updated README and SKILL.md to document the context-aware workflow while keeping `context` frontmatter as an optional audit extension compatible with Claude-style skills.

            ## Usage

            ```bash
            # Update skill-audit
            npm install -g @hungpg/skill-audit

            # Or with bun
            bun install -g @hungpg/skill-audit
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # This job runs after release is created, which triggers publish.yml
  publish:
    needs: release
    runs-on: ubuntu-latest
    if: needs.release.outputs.has_changes == 'true'

    steps:
      - name: Log publish trigger
        run: |
          echo "Release v${{ needs.release.outputs.version }} created"
          echo "publish.yml will automatically publish to npm"
